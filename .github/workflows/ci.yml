name: CI

on:
  push:
  pull_request:

env:
  # Must match `wasm-bindgen` in culinator-wasm/Cargo.toml — the CLI refuses to
  # process a module built by a different version.
  WASM_BINDGEN_VERSION: "0.2.126"

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # The desktop app parses recipes via WebAssembly; building for this
          # target here catches a dependency that cannot reach wasm before it
          # breaks the frontend job.
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo build -p culinator-wasm --target wasm32-unknown-unknown --release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: culinator-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: culinator-desktop/package-lock.json
      # `src/generated/wasm` is build output, not source, so every frontend
      # check has to compile the parser first: typecheck reads its .d.ts and
      # lint/build resolve its module.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ env.WASM_BINDGEN_VERSION }}
      - run: npm ci
      - run: npm run build:wasm
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
